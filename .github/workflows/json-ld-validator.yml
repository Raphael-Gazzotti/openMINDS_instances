name: JSON-LD Validator

on:
  pull_request:
    branches:
      - json-ld-validator
  push:
    branches:
      - json-ld-validator

jobs:
  validate-jsonld:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout instances repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # Ensure enough history is checked out
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install JSONLint
        run: npm install -g jsonlint

      - name: Validate JSON-LD files
        run: |
          # Check if there is more than one commit
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "More than one commit detected, running git diff between HEAD^ and HEAD"
            # Get the list of added or modified .jsonld files between the last two commits
            git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '\.jsonld$' > changed_files.txt || true
          else
            echo "Only one commit detected, running git diff on HEAD"
            # Handle the case where there is only one commit
            git diff --name-only --diff-filter=AM HEAD | grep '\.jsonld$' > changed_files.txt || true
          fi

          # Output files that are being validated
          if [ -s changed_files.txt ]; then
            echo "The following JSON-LD files will be validated:"
            cat changed_files.txt

            # Validate each changed .jsonld file
            xargs -n1 jsonlint -q < changed_files.txt || { echo "JSON validation failed for some files."; exit 1; }
          else
            echo "No JSON-LD files to validate."
          fi
        shell: bash
